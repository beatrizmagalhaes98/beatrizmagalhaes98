name: Generate Languages Image

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: beatrizmagalhaes98
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          output_action: commit
          committer_branch: languages-output
          filename: languages.svg
